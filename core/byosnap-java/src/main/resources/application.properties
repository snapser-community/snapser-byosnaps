# The BYOSnap must listen on 5003 (matches snapser-byosnap-profile.json external_port).
server.port=5003

# Application name shown in logs.
spring.application.name=byosnap-core

# springdoc / swagger-ui (local dev only). The AUTHORITATIVE spec Snapser uses
# is the hand-authored snapser-resources/swagger.json, NOT this generated one.
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/v3/api-docs
